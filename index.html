<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Server Validation Tool</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="app">

    <div class="canvas">
        <div id="wrap">
            <img id="img" src="server_image.png">
            <div id="overlay"></div>
        </div>
    </div>

    <div class="sidebar">

        <div class="title">SERVER VALIDATION TOOL</div>

        

        <div class="model-box">
            <div class="model-label">Server Model</div>
            <input id="serverModel" type="text" placeholder="Enter server model..." />
        </div>

        
        <button id="template1" class="template-btn">
            <small>Controller Backplane</small>
        </button>

        <button id="template2" class="template-btn">
            <small>Controller Backplane + GPU</small>
        </button>

        <button id="template3" class="template-btn">
            <small>No Controller Backplane</small>
        </button>

        <button id="template4" class="template-btn">
            <small>No Controller Backplane + GPU</small>
        </button>
        
        <button id="exportPdf">Export PDF</button>
        <button id="exportImage">Download Image</button>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
